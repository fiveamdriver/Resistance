[project]
name = "resistance-kicad-mcp"
version = "0.1.0"
description = "MCP server exposing KiCad projects (schematics, boards, BOM, DRC) to AI assistants"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "mcp[cli]>=1.0",
    "kiutils>=1.4",
    "httpx>=0.27",
]

[project.scripts]
resistance-kicad-mcp = "kicad_mcp.server:main"

[dependency-groups]
dev = [
    "pytest>=8.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/kicad_mcp"]

[tool.pytest.ini_options]
testpaths = ["tests"]
